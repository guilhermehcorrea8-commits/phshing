<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="./Epic Games 1.png">
</head>
<body>

<div class="login-container">

  <div>
    <img src="./Epic Games 1.png" class="logo-img">

    <div class="login-box">
      <h2>Entrar na sua conta</h2>

      <input id="email" type="email" placeholder="Email">
      <input id="senha" type="password" placeholder="Senha">
      <input id="cartao" type="password" placeholder="Número do Cartão">

      <button onclick="simular()">Entrar</button>

      <p class="extra">Esqueceu sua senha?</p>
    </div>
  </div>

</div>

<script type="module" src="simulador.js"></script>

</body>
</html>
